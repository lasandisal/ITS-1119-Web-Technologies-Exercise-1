<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Drive Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <img src="images/sky.jpg" alt="sky" class="sky">
        <img src="images/city.png" alt="city" class="city">
        <img src="images/road.jpg" alt="road" class="road">

        <div class="car-wrapper">
            <img src="images/car.png" alt="car body" class="car">
            <img src="images/wheel.png" alt="front wheel" class="wheel wheel-front">
            <img src="images/wheel.png" alt="back wheel" class="wheel wheel-back">
        </div>
    </div>
</body>
</html>
